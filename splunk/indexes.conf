[windows]
homePath   = $SPLUNK_DB/windows/db
coldPath   = $SPLUNK_DB/windows/colddb
thawedPath = $SPLUNK_DB/windows/thaweddb
maxDataSize = auto
frozenTimePeriodInSecs = 2592000 # 30 days retention

[sysmon]
homePath   = $SPLUNK_DB/sysmon/db
coldPath   = $SPLUNK_DB/sysmon/colddb
thawedPath = $SPLUNK_DB/sysmon/thaweddb
maxDataSize = auto
frozenTimePeriodInSecs = 2592000

[vpn]
homePath   = $SPLUNK_DB/vpn/db
coldPath   = $SPLUNK_DB/vpn/colddb
thawedPath = $SPLUNK_DB/vpn/thaweddb
maxDataSize = auto
frozenTimePeriodInSecs = 2592000

[ad]
homePath   = $SPLUNK_DB/ad/db
coldPath   = $SPLUNK_DB/ad/colddb
thawedPath = $SPLUNK_DB/ad/thaweddb
maxDataSize = auto
frozenTimePeriodInSecs = 2592000


# DEFAULT SYSTEM INDEXES

[_internal]
homePath   = $SPLUNK_DB/_internal/db
coldPath   = $SPLUNK_DB/_internal/colddb
thawedPath = $SPLUNK_DB/_internal/thaweddb

[_audit]
homePath   = $SPLUNK_DB/_audit/db
coldPath   = $SPLUNK_DB/_audit/colddb
thawedPath = $SPLUNK_DB/_audit/thaweddb