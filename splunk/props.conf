# ==========================================================
# props.conf
# Enterprise SOC Monitoring & Incident Response Lab
# ==========================================================
#
# Purpose:
# Defines parsing and normalization settings for the primary
# log sources collected by Splunk Enterprise in this lab.
#
# Log Sources:
# - Windows Event Logs
# - PowerShell Operational Logs
# - Sysmon Operational Logs
# - OpenVPN Logs
#
# ==========================================================

# ----------------------------------------------------------
# Windows Security Events
# ----------------------------------------------------------

[WinEventLog:Security]
SHOULD_LINEMERGE = false

# ----------------------------------------------------------
# Windows System Events
# ----------------------------------------------------------

[WinEventLog:System]
SHOULD_LINEMERGE = false

# ----------------------------------------------------------
# Windows Application Events
# ----------------------------------------------------------

[WinEventLog:Application]
SHOULD_LINEMERGE = false

# ----------------------------------------------------------
# PowerShell Operational Logs
# ----------------------------------------------------------

[WinEventLog:Microsoft-Windows-PowerShell/Operational]
SHOULD_LINEMERGE = false

# ----------------------------------------------------------
# Sysmon Operational Logs
# ----------------------------------------------------------

[XmlWinEventLog:Microsoft-Windows-Sysmon/Operational]
KV_MODE = xml
SHOULD_LINEMERGE = false

# ----------------------------------------------------------
# OpenVPN Logs
# ----------------------------------------------------------

[openvpn]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %a %b %d %H:%M:%S %Y

# ==========================================================
# Notes
# ==========================================================
#
# - Windows Event Logs are forwarded using Splunk Universal
#   Forwarder.
#
# - Sysmon events are parsed in XML format to preserve
#   structured event fields for detection engineering and
#   threat hunting.
#
# - OpenVPN logs provide remote access telemetry used for
#   authentication monitoring and attack simulation.
#
# - Additional field extractions and parsing rules may be
#   introduced as new telemetry sources are integrated into
#   the lab.
#
# ==========================================================
# End of File
# ==========================================================